name: Treinar Classificador

on:
  # schedule:
  #   # 04:00 UTC (01:00 BRT), dia 1 de cada mês
  #   # - cron: "0 4 1 * *"
  workflow_dispatch:

jobs:
  treinar-classificador:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar classificador no Railway (com retry)
        run: |
          MAX_TENTATIVAS=5
          ESPERA=120
          BASE_URL="${{ secrets.API_URL }}"
          BASE_URL="${BASE_URL%/}"

          for i in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $i/$MAX_TENTATIVAS..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              -X POST "$BASE_URL/tarefas/treinar-classificador" \
              -H "X-API-Key: ${{ secrets.API_KEY }}")

            echo "HTTP $STATUS"

            if [ "$STATUS" = "202" ]; then
              echo "Classificador iniciado com sucesso."
              exit 0
            elif [ "$STATUS" = "409" ]; then
              echo "Tarefa já em andamento. Abortando."
              exit 0
            fi

            if [ $i -lt $MAX_TENTATIVAS ]; then
              echo "Aguardando ${ESPERA}s antes de retentar..."
              sleep $ESPERA
            fi
          done

          echo "Falha após $MAX_TENTATIVAS tentativas."
          exit 1
