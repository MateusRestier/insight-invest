name: Treinar Regressor (Diário)

on:
  schedule:
    # 00:30 UTC (21:30 BRT) — dias úteis, 30 min após o 2º scraper (23:00 UTC)
    - cron: "30 0 * * 2-6"
  workflow_dispatch:

jobs:
  treinar-regressor:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar regressor no Railway (com retry)
        run: |
          MAX_TENTATIVAS=5
          ESPERA=120
          BASE_URL="${{ secrets.API_URL }}"
          BASE_URL="${BASE_URL%/}"

          for i in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $i/$MAX_TENTATIVAS..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              -X POST "$BASE_URL/tarefas/treinar-regressor" \
              -H "X-API-Key: ${{ secrets.API_KEY }}")

            echo "HTTP $STATUS"

            if [ "$STATUS" = "202" ]; then
              echo "Regressor iniciado com sucesso."
              exit 0
            elif [ "$STATUS" = "409" ]; then
              echo "Tarefa já em andamento. Abortando."
              exit 0
            fi

            if [ $i -lt $MAX_TENTATIVAS ]; then
              echo "Aguardando ${ESPERA}s antes de retentar..."
              sleep $ESPERA
            fi
          done

          echo "Falha após $MAX_TENTATIVAS tentativas."
          exit 1
