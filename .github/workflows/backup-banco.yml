name: Backup Banco

on:
  schedule:
    # 00:01 BRT (03:01 UTC), todo sábado
    - cron: "1 3 * * 6"
  workflow_dispatch:

jobs:
  backup-banco:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Disparar backup do banco no Railway (com retry)
        run: |
          MAX_TENTATIVAS=5
          ESPERA=120
          BASE_URL="${{ secrets.API_URL }}"
          BASE_URL="${BASE_URL%/}"

          for i in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $i/$MAX_TENTATIVAS..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 60 \
              -X POST "$BASE_URL/tarefas/backup-banco" \
              -H "X-API-Key: ${{ secrets.API_KEY }}")

            echo "HTTP $STATUS"

            if [ "$STATUS" = "202" ]; then
              echo "Backup aceito para execução."
              exit 0
            elif [ "$STATUS" = "409" ]; then
              echo "Tarefa já em andamento. Abortando."
              exit 0
            fi

            if [ $i -lt $MAX_TENTATIVAS ]; then
              echo "Aguardando ${ESPERA}s antes de retentar..."
              sleep $ESPERA
            fi
          done

          echo "Falha após $MAX_TENTATIVAS tentativas."
          exit 1
