services:
  # Banco local opcional — usado apenas com: docker compose --profile local up
  db:
    profiles: [local]
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-stocks}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-stocks}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - custom_net

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - modelo:/app/modelo
    working_dir: /app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    networks:
      - custom_net

  dashboard:
    build: .
    restart: always
    ports:
      - "8050:8050"
    env_file: .env
    volumes:
      - modelo:/app/modelo
    working_dir: /app
    command: python src/dashboard/app.py
    networks:
      - custom_net


volumes:
  postgres_data:
  modelo:

networks:
  custom_net:
    driver: bridge
